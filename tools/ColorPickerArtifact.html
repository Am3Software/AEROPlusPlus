<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VTK Color Picker</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { margin: 0; background: #1a1a1a; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Il tipo text/babel dice a Babel di transpilare JSX — VS Code non lo capisce ma il browser sì -->
  <script type="text/babel"> /* eslint-disable */
    const { useState } = React;

    function ColorPicker() {
      const [color, setColor] = useState("#262626");

      const hexToRgb = (hex) => ({
        r: parseInt(hex.slice(1, 3), 16),
        g: parseInt(hex.slice(3, 5), 16),
        b: parseInt(hex.slice(5, 7), 16),
      });

      const { r, g, b } = hexToRgb(color);
      const redValue = r;
      const greenValue = g;
      const blueValue = b;

      const copy = (text) => navigator.clipboard.writeText(text);

      const cppBackground = `renderer->SetBackground(${redValue}, ${greenValue}, ${blueValue});`;
      const cppSetColor   = `plotter.setBackground(${redValue}, ${greenValue}, ${blueValue});`;
      const cppComponent  = `plotter.setColor(${redValue}, ${greenValue}, ${blueValue});`;

      const boxStyle = {
        background: "#2a2a2a", borderRadius: 10, padding: 20, marginBottom: 16
      };
      const codeStyle = {
        background: "#1e2a1e", borderRadius: 10, padding: 20, marginBottom: 8
      };
      const btnStyle = {
        marginTop: 8, padding: "4px 12px", borderRadius: 6,
        background: "#444", color: "#fff", border: "none",
        cursor: "pointer", fontSize: 12
      };

      return (
        <div style={{ fontFamily: "monospace", padding: 32, background: "#1a1a1a", minHeight: "100vh", color: "#eee" }}>
          <h2 style={{ marginBottom: 24, color: "#fff" }}>🎨 VTK Color Picker — Aero++</h2>

          {/* Preview */}
          <div style={{
            width: "100%", height: 120, borderRadius: 12,
            background: color, marginBottom: 24, border: "2px solid #444"
          }} />

          {/* Picker */}
          <input
            type="color"
            value={color}
            onChange={(e) => setColor(e.target.value)}
            style={{ width: "100%", height: 60, border: "none", borderRadius: 8, cursor: "pointer", marginBottom: 24 }}
          />

          {/* RGB 0-255 */}
          <div style={boxStyle}>
            <div style={{ marginBottom: 8, color: "#aaa" }}>RGB [0, 255]</div>
            <div style={{ fontSize: 22, color: "#fff" }}>R: {r} &nbsp; G: {g} &nbsp; B: {b}</div>
          </div>

          {/* RGB normalizzato */}
          <div style={boxStyle}>
            <div style={{ marginBottom: 8, color: "#aaa" }}>RGB normalizzato [0, 1]</div>
            <div style={{ fontSize: 18, color: "#7ec8e3" }}>{redValue}, {greenValue}, {blueValue}</div>
          </div>

          {/* Codice C++ */}
          <div style={codeStyle}>
            <div style={{ marginBottom: 6, color: "#aaa" }}>SetBackground</div>
            <div style={{ fontSize: 13, color: "#90ee90" }}>{cppBackground}</div>
            <button style={btnStyle} onClick={() => copy(cppBackground)}>📋 Copia</button>
          </div>

          <div style={codeStyle}>
            <div style={{ marginBottom: 6, color: "#aaa" }}>setBackground</div>
            <div style={{ fontSize: 13, color: "#90ee90" }}>{cppSetColor}</div>
            <button style={btnStyle} onClick={() => copy(cppSetColor)}>📋 Copia</button>
          </div>

          <div style={codeStyle}>
            <div style={{ marginBottom: 6, color: "#aaa" }}>setColor</div>
            <div style={{ fontSize: 13, color: "#90ee90" }}>{cppComponent}</div>
            <button style={btnStyle} onClick={() => copy(cppComponent)}>📋 Copia</button>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<ColorPicker />);
  </script>
</body>
</html>
